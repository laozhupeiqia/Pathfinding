<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>寻路算法 - 网格地图</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				}
			body {
				background: #1a1a2e;
				display: flex;
				justify-content: center;
				align-items: flex-start;
				min-height: 100vh;
				padding: 40px 20px;
				font-family: 'Segoe UI', sans-serif;
				}
			#app {
				display: flex;
				gap: 16px;
				align-items: flex-start;
				}
			#toolbar {
				background: #16213e;
				padding: 12px;
				border-radius: 12px;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
				display: flex;
				flex-direction: column;
				gap: 10px;
				}
			.tool-btn {
				width: 48px;
				height: 48px;
				border: 2px solid transparent;
				border-radius: 10px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.2s;
				background: #0a0a1a;
				}
			.tool-btn:hover {
				transform: scale(1.05);
				}
			.tool-btn.active {
				border-color: #64ffda;
				box-shadow: 0 0 12px rgba(100, 255, 218, 0.3);
				}
			.tool-btn svg {
				width: 28px;
				height: 28px;
				}
			.tool-label {
				font-size: 11px;
				text-align: center;
				margin-top: 2px;
				}
			#canvasWrap {
				background: #16213e;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
				flex-shrink: 0;
				}
			canvas {
				display: block;
				border: 2px solid #0f3460;
				border-radius: 4px;
				cursor: pointer;
				}
			#panel {
				background: #16213e;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
				min-width: 200px;
				color: #a8b2d1;
				}
			#panel h3 {
				color: #64ffda;
				margin-bottom: 16px;
				font-size: 16px;
				}
			.control-group {
				margin-bottom: 16px;
				}
			.control-group label {
				display: block;
				font-size: 13px;
				margin-bottom: 4px;
				}
			.control-group input[type="number"],
			.control-group select {
				width: 100%;
				padding: 8px 10px;
				border: 1px solid #0f3460;
				border-radius: 6px;
				background: #0a0a1a;
				color: #64ffda;
				font-size: 16px;
				font-weight: bold;
				outline: none;
				}
			.control-group input[type="number"]:focus,
			.control-group select:focus {
				border-color: #64ffda;
				}
			.control-group select option {
				background: #0a0a1a;
				color: #64ffda;
				}
			.btn-action {
				width: 100%;
				padding: 10px;
				border: 1px solid #0f3460;
				border-radius: 6px;
				font-size: 14px;
				font-weight: bold;
				cursor: pointer;
				transition: all 0.2s;
				margin-top: 4px;
				}
			#btnStartDemo {
				background: #064e3b;
				color: #34d399;
				border-color: #065f46;
				}
			#btnStartDemo:hover {
				background: #065f46;
				border-color: #34d399;
				}
			#btnReset {
				background: #0a0a1a;
				color: #64ffda;
				border-color: #0f3460;
				}
			#btnReset:hover {
				border-color: #64ffda;
				background: #1a2a4e;
				}
			#legend {
				margin-top: 16px;
				font-size: 12px;
				}
			#legend div {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 4px;
				}
			#legend .dot {
				width: 14px;
				height: 14px;
				border-radius: 3px;
				flex-shrink: 0;
				}
		</style>
	</head>
	<body>
		<div id="app">
			<div id="toolbar">
				<div>
					<button class="tool-btn" id="btnStart" title="起点">
						<svg viewBox="0 0 24 24" fill="none">
							<circle cx="12" cy="12" r="9" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
							<path d="M12 7v5l3 3" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
						</svg>
					</button>
					<div class="tool-label" style="color:#22c55e;">起点</div>
				</div>
				<div>
					<button class="tool-btn" id="btnEnd" title="终点">
						<svg viewBox="0 0 24 24" fill="none">
							<circle cx="12" cy="12" r="9" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
							<path d="M12 7v5l3 3" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
						</svg>
					</button>
					<div class="tool-label" style="color:#ef4444;">终点</div>
				</div>
				<div>
					<button class="tool-btn" id="btnWall" title="路障">
						<svg viewBox="0 0 24 24" fill="none">
							<rect x="4" y="4" width="16" height="16" rx="3" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
							<line x1="8" y1="8" x2="16" y2="16" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
							<line x1="16" y1="8" x2="8" y2="16" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
						</svg>
					</button>
					<div class="tool-label" style="color:#94a3b8;">路障</div>
				</div>
			</div>
			<div id="canvasWrap">
				<canvas id="gridCanvas"></canvas>
			</div>
			<div id="panel">
				<h3>网格设置</h3>
				<div class="control-group">
					<label>行数</label>
					<input type="number" id="rowsInput" min="2" max="100" value="25" />
				</div>
				<div class="control-group">
					<label>列数</label>
					<input type="number" id="colsInput" min="2" max="100" value="25" />
				</div>
				<div class="control-group">
					<label>寻路算法</label>
					<select id="algoSelect">
						<option value="">-- 选择算法 --</option>
						<option value="astar">A*</option>
					</select>
				</div>
				<div id="legend">
					<div><span class="dot" style="background:#60a5fa;"></span>待探索</div>
					<div><span class="dot" style="background:#334155;"></span>已探索</div>
					<div><span class="dot" style="background:#fbbf24;"></span>最终路径</div>
				</div>
				<button class="btn-action" id="btnStartDemo">开始演示</button>
				<button class="btn-action" id="btnReset">重置演示</button>
			</div>
		</div>
		<script>
			// ==============================
			// 状态
			// ==============================
			const canvas = document.getElementById('gridCanvas');
			const ctx = canvas.getContext('2d');
			const rowsInput = document.getElementById('rowsInput');
			const colsInput = document.getElementById('colsInput');
			const algoSelect = document.getElementById('algoSelect');
			const btnStart = document.getElementById('btnStart');
			const btnEnd = document.getElementById('btnEnd');
			const btnWall = document.getElementById('btnWall');
			const btnReset = document.getElementById('btnReset');
			const btnStartDemo = document.getElementById('btnStartDemo');

			let currentTool = null;
			let startCell = null;
			let endCell = null;
			const walls = new Set();

			let animTimer = null;
			let algoGen = null;
			const STEP_DELAY = 80;

			// 当前搜索状态（用于绘制）
			let searchState = null; // { open: Set, closed: Set, path: [] or null }

			function cellKey(r, c) { return r + ',' + c; }

			function getCellSize(rows, cols) {
				const maxW = Math.min(800, window.innerWidth - 360);
				const maxH = Math.min(700, window.innerHeight - 120);
				const byRows = Math.floor(maxH / rows);
				const byCols = Math.floor(maxW / cols);
				return Math.max(4, Math.min(byRows, byCols, 40));
				}

			// ==============================
			// 绘制
			// ==============================
			function drawGrid() {
				const rows = parseInt(rowsInput.value) || 25;
				const cols = parseInt(colsInput.value) || 25;
				const cs = getCellSize(rows, cols);
				const w = cols * cs, h = rows * cs;
				canvas.width = w;
				canvas.height = h;

				// 背景
				ctx.fillStyle = '#181825';
				ctx.fillRect(0, 0, w, h);

				// 已探索
				if (searchState) {
					ctx.fillStyle = '#334155';
					for (const key of searchState.closed) {
						const [r, c] = key.split(',').map(Number);
						ctx.fillRect(c * cs, r * cs, cs, cs);
					}
				}

				// 待探索
				if (searchState) {
					ctx.fillStyle = '#60a5fa';
					for (const key of searchState.open) {
						const [r, c] = key.split(',').map(Number);
						ctx.fillRect(c * cs, r * cs, cs, cs);
					}
				}

				// 路障
				ctx.fillStyle = '#1e293b';
				for (const key of walls) {
					const [r, c] = key.split(',').map(Number);
					ctx.fillRect(c * cs, r * cs, cs, cs);
				}

				// 最终路径
				if (searchState && searchState.path) {
					ctx.fillStyle = '#fbbf24';
					for (const p of searchState.path) {
						ctx.fillRect(p.col * cs, p.row * cs, cs, cs);
					}
				}

				// 网格线
				ctx.strokeStyle = '#2a3a5c';
				ctx.lineWidth = 0.5;
				for (let c = 0; c <= cols; c++) {
					const x = c * cs;
					ctx.beginPath();
					ctx.moveTo(x, 0);
					ctx.lineTo(x, h);
					ctx.stroke();
				}
				for (let r = 0; r <= rows; r++) {
					const y = r * cs;
					ctx.beginPath();
					ctx.moveTo(0, y);
					ctx.lineTo(w, y);
					ctx.stroke();
				}

				// 起点
				if (startCell) {
					ctx.fillStyle = '#22c55e';
					ctx.fillRect(startCell.col * cs + 1, startCell.row * cs + 1, cs - 2, cs - 2);
				}
				// 终点
				if (endCell) {
					ctx.fillStyle = '#ef4444';
					ctx.fillRect(endCell.col * cs + 1, endCell.row * cs + 1, cs - 2, cs - 2);
				}
				}

			// ==============================
			// 工具逻辑
			// ==============================
			function getCell(e) {
				const rows = parseInt(rowsInput.value) || 25;
				const cols = parseInt(colsInput.value) || 25;
				const cs = getCellSize(rows, cols);
				const rect = canvas.getBoundingClientRect();
				const col = Math.floor((e.clientX - rect.left) / cs);
				const row = Math.floor((e.clientY - rect.top) / cs);
				if (col < 0 || col >= cols || row < 0 || row >= rows) return null;
				return { row, col };
				}

			function setTool(tool) {
				if (currentTool === tool) {
					currentTool = null;
					btnStart.classList.remove('active');
					btnEnd.classList.remove('active');
					btnWall.classList.remove('active');
					canvas.style.cursor = 'pointer';
					return;
				}
				currentTool = tool;
				btnStart.classList.toggle('active', tool === 'start');
				btnEnd.classList.toggle('active', tool === 'end');
				btnWall.classList.toggle('active', tool === 'wall');
				canvas.style.cursor = tool === 'wall' ? 'crosshair' : 'pointer';
				}

			btnStart.addEventListener('click', () => setTool('start'));
			btnEnd.addEventListener('click', () => setTool('end'));
			btnWall.addEventListener('click', () => setTool('wall'));

			function stopSearch() {
				if (animTimer) clearTimeout(animTimer);
				animTimer = null;
				algoGen = null;
				}

			function startSearch(algoId) {
				stopSearch();
				if (!startCell || !endCell) return;

				const rows = parseInt(rowsInput.value) || 25;
				const cols = parseInt(colsInput.value) || 25;

				const registry = { astar: aStarSearch };
				const factory = registry[algoId];
				if (!factory) return;

				searchState = null;
				algoGen = factory(rows, cols, walls, startCell, endCell);

				function tick() {
				if (!algoGen) return;
				const result = algoGen.next();
				if (result.done) {
					animTimer = null;
					algoGen = null;
					return;
				}
				searchState = result.value;
				drawGrid();
				animTimer = setTimeout(tick, STEP_DELAY);
				}
				animTimer = setTimeout(tick, STEP_DELAY);
				}

			function resetSearch() {
				stopSearch();
				searchState = null;
				drawGrid();
				}

			// ==============================
			// A* 算法（generator）
			// ==============================
			function* aStarSearch(rows, cols, walls, start, end) {
				const startKey = cellKey(start.row, start.col);
				const endKey = cellKey(end.row, end.col);

				// [f, g, r, c]
				const openHeap = [];
				const openSet = new Set();
				const closedSet = new Set();
				const gScore = {};
				const parent = {};

				function h(r, c) {
					return Math.abs(r - end.row) + Math.abs(c - end.col);
				}

				openHeap.push([h(start.row, start.col), 0, start.row, start.col]);
				openSet.add(startKey);
				gScore[startKey] = 0;
				parent[startKey] = null;

				const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];

				while (openHeap.length > 0) {
					openHeap.sort((a, b) => a[0] - b[0]);
					const [f, g, r, c] = openHeap.shift();
					const key = cellKey(r, c);

					if (closedSet.has(key)) continue;

					openSet.delete(key);
					closedSet.add(key);

					if (r === end.row && c === end.col) {
						const path = [];
						let cur = key;
						while (cur && parent.hasOwnProperty(cur)) {
							const [pr, pc] = cur.split(',').map(Number);
							path.unshift({ row: pr, col: pc });
							cur = parent[cur];
						}
						yield { open: new Set(openSet), closed: closedSet, path };
						return;
					}

					yield { open: new Set(openSet), closed: new Set(closedSet), path: null };

					for (const [dr, dc] of dirs) {
						const nr = r + dr, nc = c + dc;
						const nkey = cellKey(nr, nc);
						if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
						if (walls.has(nkey)) continue;
						if (closedSet.has(nkey)) continue;

						const tentG = g + 1;
						if (tentG < (gScore[nkey] ?? Infinity)) {
							gScore[nkey] = tentG;
							parent[nkey] = key;
							const nh = h(nr, nc);
							openHeap.push([tentG + nh, tentG, nr, nc]);
							openSet.add(nkey);
						}
					}
				}

				yield { open: new Set(), closed: closedSet, path: [] };
				}

			// ==============================
			// 事件绑定
			// ==============================
			canvas.addEventListener('click', (e) => {
				if (!currentTool) return;
				const cell = getCell(e);
				if (!cell) return;
				const { row, col } = cell;

				// 操作画布时停止搜索
				stopSearch();
				searchState = null;

				if (currentTool === 'start') {
					if (endCell && endCell.row === row && endCell.col === col) return;
					if (walls.has(cellKey(row, col))) return;
					startCell = { row, col };
				} else if (currentTool === 'end') {
					if (startCell && startCell.row === row && startCell.col === col) return;
					if (walls.has(cellKey(row, col))) return;
					endCell = { row, col };
				} else if (currentTool === 'wall') {
					const key = cellKey(row, col);
					if ((startCell && startCell.row === row && startCell.col === col) ||
						(endCell && endCell.row === row && endCell.col === col)) return;
					if (walls.has(key)) walls.delete(key);
					else walls.add(key);
				}
				drawGrid();

				});

			// 拖动绘制路障
			let painting = false;
			canvas.addEventListener('mousedown', (e) => {
				if (currentTool !== 'wall') return;
				painting = true;
				const cell = getCell(e);
				if (!cell) return;
				const { row, col } = cell;
				if ((startCell && startCell.row === row && startCell.col === col) ||
					(endCell && endCell.row === row && endCell.col === col)) return;

				stopSearch();
				searchState = null;

				const key = cellKey(row, col);
				if (walls.has(key)) walls.delete(key);
				else walls.add(key);
				drawGrid();
				});

			canvas.addEventListener('mousemove', (e) => {
				if (!painting || currentTool !== 'wall') return;
				const cell = getCell(e);
				if (!cell) return;
				const { row, col } = cell;
				if ((startCell && startCell.row === row && startCell.col === col) ||
					(endCell && endCell.row === row && endCell.col === col)) return;
				walls.add(cellKey(row, col));
				drawGrid();
				});

			window.addEventListener('mouseup', () => { painting = false; });

			btnReset.addEventListener('click', resetSearch);
			btnStartDemo.addEventListener('click', () => startSearch(algoSelect.value));

			algoSelect.addEventListener('change', () => {
				stopSearch();
				searchState = null;
				drawGrid();
				});

			rowsInput.addEventListener('input', () => {
				stopSearch();
				searchState = null;
				startCell = null;
				endCell = null;
				walls.clear();
				drawGrid();
				});
			colsInput.addEventListener('input', () => {
				stopSearch();
				searchState = null;
				startCell = null;
				endCell = null;
				walls.clear();
				drawGrid();
				});

			drawGrid();
		</script>
	</body>
</html>
